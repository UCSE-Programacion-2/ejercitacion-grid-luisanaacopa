name: Setup assignment issues

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
  repository_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: setup-issues-${{ github.repository }}
  cancel-in-progress: false

jobs:
  ensure-assignment-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Crear issues faltantes de la actividad
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 << 'PY'
          import json
          import os
          import textwrap
          import urllib.error
          import urllib.parse
          import urllib.request

          REPO = os.environ["GITHUB_REPOSITORY"]
          TOKEN = os.environ["GITHUB_TOKEN"]
          API = "https://api.github.com"
          ISSUE_LABEL = "classroom-assignment"

          ISSUES = [
              {
                  "title": "[Entrega] Estructura base del proyecto",
                  "body": """
          ## Objetivo
          Preparar la base de archivos y carpetas para comenzar la práctica.

          ## Qué debe cumplirse
          - [ ] Existe `index.html`.
          - [ ] Existe `css/`.
          - [ ] Existe `img/`.

          ## Criterio automático
          `bash scripts/classroom-check.sh base-structure` -> `CORRECTO`.""",
              },
              {
                  "title": "[Requisito] Enlace de hoja de estilos",
                  "body": """
          ## Objetivo
          Vincular correctamente el CSS de la práctica.

          ## Qué debe cumplirse
          - [ ] Existe `css/style.css`.
          - [ ] `index.html` enlaza la hoja con `<link ... href="css/style.css">`.

          ## Criterio automático
          `bash scripts/classroom-check.sh css-linked` -> `CORRECTO`.""",
              },
              {
                  "title": "[Requisito] Uso de Grid en CSS",
                  "body": """
          ## Objetivo
          Comenzar el layout con CSS Grid.

          ## Qué debe cumplirse
          - [ ] Existe al menos una regla con `display: grid` (o `inline-grid`).

          ## Criterio automático
          `bash scripts/classroom-check.sh grid-display` -> `CORRECTO`.""",
              },
              {
                  "title": "[Requisito] Definición de columnas del grid",
                  "body": """
          ## Objetivo
          Definir columnas para controlar la distribución de elementos.

          ## Qué debe cumplirse
          - [ ] Se utiliza `grid-template-columns` en el CSS.

          ## Criterio automático
          `bash scripts/classroom-check.sh grid-template` -> `CORRECTO`.""",
              },
              {
                  "title": "[Requisito] Metodología Mobile First",
                  "body": """
          ## Objetivo
          Construir base mobile y luego escalar a desktop.

          ## Qué debe cumplirse
          - [ ] Se utiliza al menos una `@media` con `min-width`.

          ## Criterio automático
          `bash scripts/classroom-check.sh mobile-first` -> `CORRECTO`.""",
              },
              {
                  "title": "[Requisito] Grilla responsive para desktop",
                  "body": """
          ## Objetivo
          Adaptar el layout para pantallas grandes siguiendo Mobile First.

          ## Qué debe cumplirse
          - [ ] En una `@media` con `min-width` se redefine la grilla.
          - [ ] Dentro de esa media query se usa `grid-template-columns`.

          ## Criterio automático
          `bash scripts/classroom-check.sh desktop-grid` -> `CORRECTO`.""",
              },
              {
                  "title": "[Revisión docente] Fidelidad visual al Figma",
                  "body": """
          ## Objetivo
          Validar la calidad visual final con criterio humano.

          ## Checklist sugerida
          - [ ] La maqueta respeta proporciones y jerarquía del Figma.
          - [ ] El comportamiento responsive es coherente entre mobile y desktop.
          - [ ] El código está prolijo y mantiene buenas prácticas.

          ## Referencia
          Link de diseño (README): InstaFront - Grid.

          ## Nota
          Los checks automáticos verifican mínimos técnicos, pero no reemplazan la corrección docente.""",
              },
          ]

          for _spec in ISSUES:
              _spec["body"] = textwrap.dedent(_spec["body"]).strip()

          def request(method, url, data=None):
              headers = {
                  "Authorization": f"Bearer {TOKEN}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              }
              body = None
              if data is not None:
                  headers["Content-Type"] = "application/json; charset=utf-8"
                  body = json.dumps(data).encode("utf-8")
              req = urllib.request.Request(url, data=body, method=method, headers=headers)
              with urllib.request.urlopen(req) as resp:
                  return json.loads(resp.read().decode())

          def list_existing_issue_titles():
              titles = set()
              page = 1
              while True:
                  url = f"{API}/repos/{REPO}/issues?state=all&per_page=100&page={page}"
                  headers = {
                      "Authorization": f"Bearer {TOKEN}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  }
                  req = urllib.request.Request(url, headers=headers)
                  with urllib.request.urlopen(req) as resp:
                      batch = json.loads(resp.read().decode())
                  if not batch:
                      break
                  for item in batch:
                      if item.get("pull_request") is None:
                          title = item.get("title", "").strip()
                          if title:
                              titles.add(title)
                  if len(batch) < 100:
                      break
                  page += 1
              return titles

          def ensure_label_exists(label_name):
              url = f"{API}/repos/{REPO}/labels/{urllib.parse.quote(label_name)}"
              try:
                  request("GET", url)
                  return
              except urllib.error.HTTPError as e:
                  if e.code != 404:
                      raise
              request(
                  "POST",
                  f"{API}/repos/{REPO}/labels",
                  {
                      "name": label_name,
                      "color": "1d76db",
                      "description": "Issue generado automaticamente para la actividad de Classroom",
                  },
              )
              print(f"Etiqueta creada: {label_name}")

          existing_titles = list_existing_issue_titles()
          ensure_label_exists(ISSUE_LABEL)

          created_count = 0
          skipped_count = 0
          for spec in ISSUES:
              if spec["title"] in existing_titles:
                  skipped_count += 1
                  print("Ya existe, se omite: " + spec["title"])
                  continue
              url = f"{API}/repos/{REPO}/issues"
              created = request(
                  "POST",
                  url,
                  {"title": spec["title"], "body": spec["body"], "labels": [ISSUE_LABEL]},
              )
              created_count += 1
              print("Creado issue #" + str(created["number"]) + ": " + spec["title"])
          print(
              "Listo: "
              + str(created_count)
              + " issue(s) creado(s), "
              + str(skipped_count)
              + " ya existentes."
          )
          PY
